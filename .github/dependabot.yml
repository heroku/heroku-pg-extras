version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  open-pull-requests-limit: 5
  schedule:
      interval: "weekly"
      day: "monday"
  cooldown:
      default-days: 1
  commit-message:
      prefix: "deps"
  groups:
      version-updates:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      security-updates:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"
- package-ecosystem: "npm"
  directory: "/"
  open-pull-requests-limit: 5
  schedule:
      interval: "weekly"
      day: "monday"
  cooldown:
      default-days: 1
  commit-message:
      prefix: "fix"
      prefix-development: "chore"
      include: "scope"
  groups:
      development-version-updates:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-version-updates:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      security-updates:
        applies-to: "security-updates"
        update-types:
          - "minor"
          - "patch"
  ignore:
    - dependency-name: "@oclif/core"
      update-types: ["version-update:semver-major"]
    - dependency-name: "typescript"
      update-types: ["version-update:semver-major"]
